# Brings up the SMMG notebook + the Cosmos Transfer 2.5 NIM, networked together.
#
# The NIM container is NVIDIA's official inference microservice for Cosmos
# Transfer 2.5 (`nvcr.io/nim/nvidia/cosmos-transfer2.5-2b:1.0.0`). It loads
# the four bundled models (Transfer 2.5, Predict 2.5 base, Reason 1, Guardrail)
# at startup and serves /v1/infer with persistent state + concurrent requests.
#
# Auth: requires an NGC API key. Get one at
#   https://org.ngc.nvidia.com/setup/api-key
# Then before `docker compose up`:
#   echo "$NGC_API_KEY" | docker login nvcr.io --username '$oauthtoken' --password-stdin
# and export NGC_API_KEY=nvapi-...   so the cosmos-nim service inherits it.
#
# Usage (from project root):
#   docker compose -f docker/docker-compose.yml up -d
#   open http://localhost:8888         (Jupyter Lab on the SMMG notebook)
#   curl http://localhost:8000/v1/health/ready   (Cosmos NIM)
#
# The notebook reaches NIM at  http://cosmos-nim:8000  on the shared docker
# network. The host port 8000 is also forwarded for direct testing.
#
# Two-machine deployment: see the project README. Run cosmos-nim on a
# Hopper / Blackwell host, leave smmg-lab here, and set
#   COSMOS_API_URL=http://<cosmos-host>:8000
# on smmg-lab.

services:
  smmg-lab:
    image: physical-ai-lab/smmg-blackwell:1.0
    container_name: smmg-lab
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      ACCEPT_EULA: "Y"
      OMNI_KIT_ACCEPT_EULA: "YES"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "all"
      # Notebook reads this; default targets the in-compose NIM.
      COSMOS_API_URL: "http://cosmos-nim:8000"
    ports:
      - "8888:8888"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - ../data:/workspace/data:rw
      - ../checkpoints:/workspace/checkpoints:rw
      - ../evaluation:/workspace/evaluation:rw
    networks: [demo-net]
    restart: unless-stopped

  cosmos-nim:
    image: nvcr.io/nim/nvidia/cosmos-transfer2.5-2b:1.0.0
    container_name: cosmos-nim
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: "32g"
    ulimits:
      nofile: 65536
    environment:
      NGC_API_KEY: "${NGC_API_KEY:?set NGC_API_KEY in your shell — see docker-compose.yml header}"
    ports:
      - "8000:8000"
    volumes:
      # Persists ~30 GB of model weights NIM downloads on first start.
      - ${HOME}/.cache/nim:/opt/nim/.cache
    networks: [demo-net]
    restart: unless-stopped

networks:
  demo-net:
    driver: bridge
